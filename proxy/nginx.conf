# Extract real client IP: prefer Cloudflare's CF-Connecting-IP header,
# fall back to the direct connection address (for local/non-CF access).
map $http_cf_connecting_ip $real_client_ip {
    ""      $remote_addr;
    default $http_cf_connecting_ip;
}

upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:5000;
}

upstream mcp {
    server mcp-server:8811;
}

server {
    listen 80;
    server_name sheetstorm.hackstack.xyz;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size (for artifact uploads etc.)
    client_max_body_size 100M;

    # Backend API
    location /api/v1/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $real_client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-IPCountry $http_cf_ipcountry;
        proxy_set_header CF-IPCity $http_cf_ipcity;
        proxy_set_header CF-Region $http_cf_region;
        proxy_set_header CF-Ray $http_cf_ray;

        # Timeouts for long-running API calls (AI, reports, etc.)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Socket.IO WebSocket + polling
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $real_client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-IPCountry $http_cf_ipcountry;
        proxy_set_header CF-IPCity $http_cf_ipcity;
        proxy_set_header CF-Region $http_cf_region;
        proxy_set_header CF-Ray $http_cf_ray;

        # WebSocket timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # MCP Server SSE endpoint
    location /sse {
        proxy_pass http://mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $real_client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # MCP Server message endpoint
    location /messages/ {
        proxy_pass http://mcp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $real_client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # MCP Streamable HTTP endpoint (used by Gemini CLI and newer MCP clients)
    location /mcp {
        proxy_pass http://mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $real_client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # MCP OAuth endpoints (authorization, token, registration, revocation, metadata)
    # Note: /register is excluded here — it's the frontend's registration page.
    # MCP OAuth dynamic client registration uses /oauth-register instead.
    location ~ ^/(authorize|token|oauth-register|revoke|sheetstorm-login|\.well-known/oauth-authorization-server|\.well-known/oauth-protected-resource) {
        proxy_pass http://mcp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $real_client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $real_client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint for cloudflared / monitoring
    location /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
